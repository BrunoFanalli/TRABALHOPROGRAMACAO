<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro | Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Novo Registro</h4>
                    </div>
                    <div class="card-body">
                        <ul class="nav nav-tabs mb-4" id="cadastroTab" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="aluno-tab" data-bs-toggle="tab" data-bs-target="#aluno" type="button">Aluno</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="professor-tab" data-bs-toggle="tab" data-bs-target="#professor" type="button">Professor</button>
                            </li>
                        </ul>

                        <div class="tab-content" id="myTabContent">
                            <div class="tab-pane fade show active" id="aluno" role="tabpanel">
                                <form action="/cadastrar_aluno" method="POST">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">Nome Completo</label>
                                            <input type="text" name="nome" class="form-control" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Nome da Măe</label>
                                            <input type="text" name="mae" class="form-control" required>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">CPF</label>
                                            <input type="text" name="cpf" class="form-control" required>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">RG</label>
                                            <input type="text" name="rg" class="form-control" required>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">Data de Nascimento</label>
                                            <input type="date" name="data_nasc" class="form-control" required>
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Senha de Acesso</label>
                                            <input type="password" name="senha" class="form-control" required>
                                        </div>
                                    </div>
                                    <div class="mt-4 d-flex justify-content-between">
                                        <a href="/dashboard" class="btn btn-outline-secondary">Cancelar</a>
                                        <button type="submit" class="btn btn-success px-4">Cadastrar Aluno</button>
                                    </div>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="professor" role="tabpanel">
                                <form action="/cadastrar_professor" method="POST">
                                    <div class="row g-3">
                                        <div class="col-md-12">
                                            <label class="form-label">Nome do Professor</label>
                                            <input type="text" name="nome_prof" class="form-control" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">CPF</label>
                                            <input type="text" name="cpf_prof" class="form-control" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">Turma Associada</label>
                                            <input type="text" name="turma" class="form-control" placeholder="Ex: 3ş Ano A" required>
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">Senha de Acesso</label>
                                            <input type="password" name="senha_prof" class="form-control" required>
                                        </div>
                                    </div>
                                    <div class="mt-4 d-flex justify-content-between">
                                        <a href="/dashboard" class="btn btn-outline-secondary">Cancelar</a>
                                        <button type="submit" class="btn btn-primary px-4">Cadastrar Professor</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
