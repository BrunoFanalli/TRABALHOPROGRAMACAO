<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>LanÁamento de Notas - Escola</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .voltar { display: block; margin-top: 15px; text-align: center; color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>LanÁar Notas (Professor)</h2>
        <form action="/lancar_nota" method="POST">
            <label>ID do Aluno:</label>
            <input type="number" name="id_aluno" placeholder="Ex: 1" required>

            <label>Nota N1:</label>
            <input type="number" step="0.1" name="n1" min="0" max="10" required>

            <label>Nota N2:</label>
            <input type="number" step="0.1" name="n2" min="0" max="10" required>

            <label>Nota N3:</label>
            <input type="number" step="0.1" name="n3" min="0" max="10" required>

            <button type="submit">Salvar e Calcular MÈdia</button>
        </form>
        <a href="/dashboard" class="voltar">Voltar ao Painel</a>
    </div>

</body>
</html>
