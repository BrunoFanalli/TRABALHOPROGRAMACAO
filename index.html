<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Escola Libano</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-auth">

<div class="auth-box">
    <div class="auth-card">

        <h2 class="text-center mb-4">Escola Libano</h2>

        <!-- LOGIN -->
        <div id="loginBox">
            <input id="loginUser" class="form-control mb-2" placeholder="Usuário">
            <input id="loginPass" type="password" class="form-control mb-3" placeholder="Senha">

            <button onclick="login()" class="btn btn-dark w-100 mb-2">Entrar</button>

            <p class="text-center small">
                Não tem conta?
                <a href="#" onclick="mostrarCadastro()">Criar conta</a>
            </p>
        </div>

        <!-- CADASTRO -->
        <div id="cadastroBox" style="display:none;">
            <input id="cadUser" class="form-control mb-2" placeholder="Usuário">
            <input id="cadPass" type="password" class="form-control mb-2" placeholder="Senha">
            <input id="cadCpf" class="form-control mb-2" placeholder="CPF">
            <input id="cadData" type="date" class="form-control mb-2">

            <select id="cadPerfil" class="form-select mb-3">
                <option value="aluno">Aluno</option>
                <option value="professor">Professor</option>
                <option value="adm">Administrador</option>
            </select>

            <button onclick="cadastrar()" class="btn btn-success w-100 mb-2">Cadastrar</button>

            <p class="text-center small">
                <a href="#" onclick="mostrarLogin()">Voltar</a>
            </p>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
